# Temporary HTTP-only config for initial Let's Encrypt certificate acquisition
# Use this FIRST, then switch to odoo.conf after obtaining certs

server {
    listen 80;
    server_name _;

    # Docker embedded DNS — resolve upstream at request time, not at nginx startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Let's Encrypt ACME challenge (required for cert acquisition & renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Logging
    access_log /var/log/nginx/odoo_access.log;
    error_log /var/log/nginx/odoo_error.log;

    proxy_buffers 16 64k;
    proxy_buffer_size 128k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        set $odoo_upstream odoo:8069;
        proxy_pass http://$odoo_upstream;
        proxy_redirect off;
    }

    location /longpolling {
        set $odoo_chat odoo:8072;
        proxy_pass http://$odoo_chat;
        proxy_redirect off;
    }

    location ~* /web/static/ {
        proxy_cache_valid 60m;
        proxy_buffering on;
        set $odoo_upstream odoo:8069;
        proxy_pass http://$odoo_upstream;
    }
}
